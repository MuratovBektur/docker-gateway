# ============================================================
# ПРИМЕР: добавьте это в docker-compose.yml каждого репозитория
# ============================================================
#
# 1. Объявите внешнюю сеть gateway_network
# 2. Подключите ваш сервис к этой сети
# 3. Убедитесь, что имя сервиса совпадает с proxy_pass в nginx/conf.d/appX.conf
#
# ВАЖНО: НЕ публикуйте порт 80 наружу (ports: - "80:80") в этих репозиториях,
#         трафик идёт через nginx-gateway по внутренней сети.

services:
  app1_service:               # <-- это имя используется в nginx proxy_pass
    build: .
    restart: unless-stopped
    # НЕ добавляйте ports: здесь — nginx обращается к контейнеру напрямую
    expose:
      - "80"
    networks:
      - gateway_network       # подключаем к общей сети шлюза
      - default               # собственная внутренняя сеть репозитория

networks:
  gateway_network:
    external: true            # сеть создана в docker-gateway, не здесь
  default:
    driver: bridge
