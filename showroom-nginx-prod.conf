# Файл: showroom/nginx/prod/default.conf
#
# SSL и редиректы 80→443 убраны — ими управляет docker-gateway.
# Этот nginx слушает только порт 80 внутри сети gateway_network.
# X-Forwarded-Proto приходит уже выставленным от шлюза.

# www → без www (внутренний редирект остаётся)
server {
    listen 80;
    listen [::]:80;
    server_name www.optom.store;
    return 301 http://optom.store$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name optom.store;

    access_log /var/log/nginx/optom.store.access.log;
    error_log  /var/log/nginx/optom.store.error.log;

    location /uploads/ {
        alias /usr/share/nginx/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^/(api|ws) {
        client_max_body_size 100m;

        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header Host              $http_host;
        proxy_set_header X-NginX-Proxy     true;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_pass http://server:5000;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_pass http://client:3000;

        add_header X-Robots-Tag "index, follow" always;
    }
}
