# optom.store — HTTP→HTTPS редирект
server {
    listen 80;
    listen [::]:80;
    server_name optom.store www.optom.store;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://optom.store$request_uri;
    }
}

# www → без www
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.optom.store;

    ssl_certificate     /etc/letsencrypt/live/optom.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/optom.store/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    return 301 https://optom.store$request_uri;
}

# optom.store → showroom_nginx_prod
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name optom.store;

    ssl_certificate     /etc/letsencrypt/live/optom.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/optom.store/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    access_log /var/log/nginx/optom.store.access.log;
    error_log  /var/log/nginx/optom.store.error.log;

    location / {
        # resolver нужен чтобы nginx не падал если upstream ещё не запущен
        resolver 127.0.0.11 valid=10s;
        set $upstream showroom_nginx_prod;

        proxy_pass http://$upstream:80;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 90s;
    }
}
