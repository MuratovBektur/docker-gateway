# admin.optom.store → host.docker.internal:3011
server {
    listen 80;
    listen [::]:80;
    server_name admin.optom.store;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.optom.store;

    # Использует тот же сертификат что и optom.store
    ssl_certificate     /etc/letsencrypt/live/optom.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/optom.store/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    access_log /var/log/nginx/admin.optom.store.access.log;
    error_log  /var/log/nginx/admin.optom.store.error.log;

    location / {
        proxy_pass http://host.docker.internal:3011;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "Upgrade";
        proxy_read_timeout 90s;
    }
}
